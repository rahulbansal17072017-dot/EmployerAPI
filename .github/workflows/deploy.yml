name: Deploy Employer API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t rahulbaksh/employerapi:latest .

      - name: Push Docker Image
        run: docker push rahulbaksh/employerapi:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull rahulbaksh/employerapi:latest

            sudo docker stop employerapi || true

            sudo docker rm employerapi || true

            sudo docker run -d \
              --name employerapi \
              -p 80:8080 \
              rahulbaksh/employerapi:latest